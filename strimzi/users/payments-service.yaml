apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: payments-service
  namespace: kafka
  labels:
    strimzi.io/cluster: production-kafka
spec:
  authentication:
    type: tls
  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          name: payments.orders.created.v1
          patternType: literal
        operations: [Write, Describe, Create]
        host: "*"
      - resource:
          type: topic
          name: payments.orders.created.v1
          patternType: literal
        operations: [Read, Describe]
        host: "*"
      - resource:
          type: group
          name: payments-service-group
          patternType: literal
        operations: [Read]
        host: "*"
