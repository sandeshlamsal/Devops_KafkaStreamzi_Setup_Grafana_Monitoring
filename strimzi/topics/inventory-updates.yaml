apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: inventory.products.updated.v1
  namespace: kafka
  labels:
    strimzi.io/cluster: production-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: "86400000"
    min.insync.replicas: "2"
    compression.type: lz4
    cleanup.policy: delete
