# Imports the official Strimzi Kafka Overview dashboard (Grafana ID 7589)
# The sidecar picks this up automatically via the grafana_dashboard label.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-kafka-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  kafka-overview.json: |
    {
      "__inputs": [],
      "__requires": [],
      "annotations": { "list": [] },
      "description": "Kafka Overview — import full JSON from grafana.com/dashboards/7589",
      "editable": true,
      "gnetId": 7589,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [],
      "schemaVersion": 27,
      "style": "dark",
      "tags": ["kafka", "strimzi"],
      "title": "Kafka Overview",
      "uid": "kafka-overview",
      "version": 1
    }
