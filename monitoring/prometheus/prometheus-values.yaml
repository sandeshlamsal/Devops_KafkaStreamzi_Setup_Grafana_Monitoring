# Helm values for kube-prometheus-stack on docker-desktop (resource-constrained)
prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    retention: 7d
    resources:
      requests:
        memory: 400Mi
        cpu: 200m
      limits:
        memory: 1Gi
        cpu: "1"
    storageSpec:
      volumeClaimTemplate:
        spec:
          # Use docker-desktop default hostpath StorageClass
          storageClassName: hostpath
          resources:
            requests:
              storage: 10Gi

grafana:
  adminPassword: admin
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 500m
  persistence:
    enabled: true
    storageClassName: hostpath
    size: 2Gi
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 128Mi
        cpu: 200m

# Reduce default scrape resources on docker-desktop
kubeStateMetrics:
  resources:
    requests:
      memory: 64Mi
      cpu: 50m

nodeExporter:
  resources:
    requests:
      memory: 32Mi
      cpu: 50m
